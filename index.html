<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FELISIRSAK & YOUNGDU</title>

<style>
body {
    font-family: Arial;
    background: #f7f8fc;
    margin: 0;
    padding: 15px;
}

/* 제목 */
h1 {
    text-align: center;
    color: #5a6acf;
}

/* 월 버튼 */
.month-nav {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    margin-bottom: 10px;
}

.month-btn {
    padding: 6px 10px;
    background: #eaeaf5;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
}

.month-btn.active {
    background: #5a6acf;
    color: white;
}

/* 슬라이드 */
.slider {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
}

.month {
    flex: 0 0 100%;
    scroll-snap-align: center;
    padding: 10px;
}

/* 요일 */
.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    font-size: 12px;
}

.sun { color: red; }
.sat { color: blue; }

/* 날짜 */
.days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.day {
    height: 45px;
    background: white;
    border-radius: 8px;
    text-align: right;
    padding: 5px;
    font-size: 12px;
    cursor: pointer;
}

/* 사진 */
#photo {
    width: 100%;
    margin-top: 15px;
    border-radius: 12px;
}

/* 버튼 */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: #5a6acf;
    color: white;
}
</style>

</head>
<body>

<h1>💖 FELISIRSAK & YOUNGDU</h1>

<!-- 🔥 월 버튼 -->
<div class="month-nav" id="monthNav"></div>

<!-- 캘린더 -->
<div class="slider" id="slider"></div>

<!-- 사진 -->
<img id="photo" style="display:none;">

<!-- 베스트 -->
<button onclick="showBest()">💖 Foto terbaik pilihan Youngdu 💕</button>

<script>

const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const loopMonths = ["DEC", ...months, "JAN"];

const slider = document.getElementById("slider");
const nav = document.getElementById("monthNav");

/* 🔥 월 버튼 생성 */
months.forEach((m, index) => {
    let btn = document.createElement("div");
    btn.className = "month-btn";
    btn.innerText = m;

    if(index === 0) btn.classList.add("active");

    btn.onclick = () => {
        slider.scrollTo({
            left: slider.clientWidth * (index + 1),
            behavior: "smooth"
        });
    };

    nav.appendChild(btn);
});

/* 월 생성 */
loopMonths.forEach((m) => {

    let monthDiv = document.createElement("div");
    monthDiv.className = "month";

    let weekdays = document.createElement("div");
    weekdays.className = "weekdays";
    weekdays.innerHTML = `
    <div class="sun">SUN</div>
    <div>MON</div>
    <div>TUE</div>
    <div>WED</div>
    <div>THU</div>
    <div>FRI</div>
    <div class="sat">SAT</div>
    `;

    let days = document.createElement("div");
    days.className = "days";

    for(let i=1;i<=31;i++){
        let d = document.createElement("div");
        d.className = "day";

        let dayOfWeek = i % 7;
        if(dayOfWeek === 1) d.classList.add("sun");
        if(dayOfWeek === 0) d.classList.add("sat");

        d.innerText = i;
        d.onclick = () => showPhoto(m + "-" + i);
        days.appendChild(d);
    }

    monthDiv.appendChild(weekdays);
    monthDiv.appendChild(days);
    slider.appendChild(monthDiv);
});

/* 시작 위치 */
window.onload = () => {
    slider.scrollLeft = slider.clientWidth;
};

/* 무한 슬라이드 */
slider.addEventListener("scroll", () => {
    let scrollLeft = slider.scrollLeft;
    let width = slider.clientWidth;
    let maxScroll = slider.scrollWidth - width;

    if(scrollLeft <= 0){
        slider.scrollLeft = width * 12;
    }
    if(scrollLeft >= maxScroll - 1){
        slider.scrollLeft = width;
    }
});

/* 사진 데이터 */
const photos = {
    // "JAN-1": "photo1.jpg"
};

/* 🔥 베스트 사진 (여기에 base64 넣기) */
const bestPhoto = "어둠.jpeg";

/* 사진 표시 */
function showPhoto(key){
    let img = document.getElementById("photo");
    img.src = photos[key] || "";
    img.style.display = "block";
}

/* 베스트 */
function showBest(){
    let img = document.getElementById("photo");
    img.src = bestPhoto;
    img.style.display = "block";
}

</script>

</body>
</html>
